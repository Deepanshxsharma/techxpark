<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#1c31d4",
              "background-light": "#f6f6f8",
              "background-dark": "#111321",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<title>TechXPark Onboarding</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="flex flex-col h-screen max-w-md mx-auto overflow-hidden relative shadow-2xl">
<!-- Top 60%: Illustration Section -->
<div class="h-[60%] w-full relative flex items-center justify-center bg-primary/5 p-8">
<div class="relative w-full h-full flex items-center justify-center">
<!-- Abstract Parking Gate Representation -->
<div class="absolute inset-0 flex items-center justify-center opacity-20">
<div class="w-full h-1 bg-primary/30 rounded-full mb-32"></div>
</div>
<!-- Main Phone Illustration -->
<div class="relative z-10 w-56 h-auto aspect-[9/18] bg-slate-900 rounded-[2.5rem] p-2 border-4 border-slate-800 shadow-2xl">
<div class="w-full h-full bg-white rounded-[2rem] overflow-hidden flex flex-col items-center justify-center p-4">
<div class="w-12 h-1 bg-slate-200 rounded-full mb-8"></div>
<div class="w-32 h-32 bg-slate-50 border-2 border-dashed border-primary/40 rounded-xl flex items-center justify-center mb-6">
<span class="material-icons text-primary text-6xl">qr_code_2</span>
</div>
<div class="w-full space-y-2">
<div class="h-2 w-2/3 bg-slate-100 rounded mx-auto"></div>
<div class="h-2 w-1/2 bg-slate-100 rounded mx-auto"></div>
</div>
</div>
</div>
<!-- Entrance Boom Barrier Decoration -->
<div class="absolute bottom-1/4 right-0 w-32 h-2 bg-primary rounded-l-full shadow-lg"></div>
<div class="absolute bottom-[23%] right-24 w-4 h-12 bg-slate-800 rounded-t-lg"></div>
</div>
<!-- Background Decoration Blobs -->
<div class="absolute top-10 left-10 w-32 h-32 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute bottom-10 right-10 w-40 h-40 bg-primary/5 rounded-full blur-3xl"></div>
</div>
<!-- Bottom 40%: Content Card -->
<div class="h-[40%] bg-white dark:bg-slate-900 rounded-t-xl shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)] flex flex-col justify-between p-8 z-20">
<div class="space-y-4">
<div class="flex flex-col items-center text-center space-y-2">
<h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100">
                        Book in 30 Seconds
                    </h1>
<p class="text-slate-500 dark:text-slate-400 leading-relaxed max-w-[280px]">
                        Reserve your slot before you arrive. Your spot waits for you.
                    </p>
</div>
<!-- Progress Dots -->
<div class="flex justify-center space-x-2 pt-2">
<div class="w-2 h-2 rounded-full bg-primary/20 dark:bg-primary/10"></div>
<div class="w-6 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-primary/20 dark:bg-primary/10"></div>
</div>
</div>
<!-- Action Button -->
<div class="w-full pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center space-x-2">
<span>Next</span>
<span class="material-icons text-sm">arrow_forward</span>
</button>
<button class="w-full mt-4 text-slate-400 dark:text-slate-500 font-medium text-sm">
                    Skip tour
                </button>
</div>
</div>
</div>
</body></html>
