name: techxpark
description: "Smart parking application by TechXPark"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.10.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 🔥 Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  firebase_database: ^10.5.7
  firebase_storage: ^11.7.7
  firebase_messaging: ^14.9.4   # ✅ FCM Push Notifications
  timezone: ^0.10.1             # ✅ Required for scheduled local notifications

  # UI & Utils
  cupertino_icons: ^1.0.8
  google_sign_in: ^6.1.0
  flutter_map: ^6.2.1
  latlong2: ^0.9.1
  location: ^5.0.3
  http: ^1.6.0
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.2
  permission_handler: ^11.4.0
  flutter_local_notifications: ^20.1.0
  shared_preferences: ^2.5.4
  image_picker: ^1.2.1
  animated_bottom_navigation_bar: ^1.4.0
  shimmer: ^3.0.0
  lottie: ^3.3.2
  geolocator: ^11.1.0
  flutter_animate: ^4.5.2
  animate_do: ^4.2.0
  flutter_timezone: ^5.0.1
  package_info_plus: ^9.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#4F46E5"
  adaptive_icon_foreground: "assets/icons/app_icon_padded.png"
  remove_alpha_ios: true
